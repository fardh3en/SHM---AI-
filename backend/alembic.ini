# A generic, single-database configuration for Alembic.

[alembic]
# path to migration scripts
script_location = backend/alembic

# template used to generate new migration files
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone = UTC

# max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow the creation of empty migrations
# sourceless = false

# version location specification; this defaults
# to backend/alembic/versions.  When using multiple version
# directories, initial steps must be taken to set up the version_locations parameter.
# version_locations = %(here)s/bar:%(here)s/bat:backend/alembic/versions

# the proposal to write output back to the console
# output_encoding = utf-8

# logging configuration is handled via python standard logging configuration library.
# We delegate this to the main application log configuration rather than configuring
# separate ini handlers here.

[post_write_hooks]
# post_write_hooks define scripts or plugins that run after a revision is created.
# For example, we can configure ruff to format the migration file automatically:
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILE
